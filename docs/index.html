<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH Sentiment Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .chart-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h2>Ethereum (ETH) Daily Volume & Sentiment Analysis</h2>

    <div class="chart-container">
        <div id="volumeChart" style="width: 100%; height: 400px;"></div>
    </div>

    <div class="chart-container">
        <div id="sentimentChart" style="width: 100%; height: 400px;"></div>
    </div>

    <script>
        // main entry point
        fetch('data_summary.json')
            .then(res => res.json())
            .then(data => {
                // map data fields for charts
                const dates = data.map(item => item.timestamp.split(' ')[0]);
                const volumes = data.map(item => item.volume);
                const prices = data.map(item => item.price);
                const bullish = data.map(item => item.sentiment.bullish);
                const bearish = data.map(item => item.sentiment.bearish);
                const neutral = data.map(item => item.sentiment.neutral);

                // setup dual-axis chart: volume vs price
                const volChart = echarts.init(document.getElementById('volumeChart'));
                volChart.setOption({
                    title: { text: 'Market Activity & Price Trend', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['Post Volume', 'ETH Price'], bottom: 0 },
                    xAxis: { type: 'category', data: dates },
                    yAxis: [
                        { type: 'value', name: 'Volume', position: 'left' },
                        { type: 'value', name: 'Price (USD)', position: 'right', axisLabel: { formatter: '${value}' } }
                    ],
                    series: [
                        {
                            name: 'Post Volume',
                            type: 'line',
                            data: volumes,
                            smooth: true,
                            yAxisIndex: 0,
                            areaStyle: { color: 'rgba(54, 162, 235, 0.1)' },
                            lineStyle: { color: '#36a2eb' }
                        },
                        {
                            name: 'ETH Price',
                            type: 'line',
                            data: prices,
                            smooth: true,
                            yAxisIndex: 1,
                            lineStyle: { color: '#f6c343', width: 3 }
                        }
                    ]
                });

                // setup sentiment distribution chart
                const sentChart = echarts.init(document.getElementById('sentimentChart'));
                sentChart.setOption({
                    title: { text: 'Sentiment Distribution', left: 'center' },
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    legend: { data: ['Bullish', 'Bearish', 'Neutral'], bottom: 0 },
                    xAxis: { type: 'category', data: dates },
                    yAxis: { type: 'value' },
                    series: [
                        { name: 'Bullish', type: 'bar', stack: 'total', data: bullish, itemStyle: { color: '#28a745' } },
                        { name: 'Bearish', type: 'bar', stack: 'total', data: bearish, itemStyle: { color: '#dc3545' } },
                        { name: 'Neutral', type: 'bar', stack: 'total', data: neutral, itemStyle: { color: '#6c757d' } }
                    ]
                });

                // keep it responsive
                window.addEventListener('resize', () => {
                    volChart.resize();
                    sentChart.resize();
                });
            })
            .catch(err => console.error('Error loading data:', err));
    </script>
</body>
</html>
