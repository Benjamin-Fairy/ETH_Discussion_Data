name: ETH Sentiment Data Automation

on:
  push:
    paths:
      - 'data_collect/**'
  schedule:
    - cron: '0 2 * * *' 
  watch:
    types: [started]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv yfinance pandas
        
      - name: Process Daily Data
        run: python scripts/process_data.py
        
      - name: Commit Processed Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data_summary.json
          git commit -m "Auto-update ETH sentiment and volume data" || echo "No changes to commit"
          git push
