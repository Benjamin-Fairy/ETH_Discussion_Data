name: Auto Screenshot Dashboard

on:
  workflow_run:
    workflows: ["ETH Sentiment Data Automation"]
    types: [completed]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  take-screenshot:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          cat << 'EOF' > screenshot.js
          const puppeteer = require('puppeteer');
          (async () => {
            console.log('Launching browser without sandbox...');
            const browser = await puppeteer.launch({ 
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1200, height: 800 });
            
            console.log('Navigating to dashboard...');
            await page.goto('https://benjamin-fairy.github.io/ETH_Discussion_Data/', { waitUntil: 'networkidle0' });
            
            console.log('Waiting for ECharts animations...');
            await new Promise(r => setTimeout(r, 2000));
            
            console.log('Taking screenshot...');
            await page.screenshot({ path: 'docs/preview.png' });
            await browser.close();
            console.log('Screenshot saved successfully!');
          })();
          EOF
          node screenshot.js

      - name: Commit and Push Screenshot
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/preview.png
          git commit -m "chore: update dashboard screenshot [skip ci]" || echo "No changes"
          git push
